name: rpi_gpsd_chrony
services:
    rpi-gpsd:
        stdin_open: true
        tty: true
        env_file:
            - config.env
        devices:
            # host side (left) is platform-specific — swap /dev/ttyACM0 for the
            # /dev/gps0 udev symlink once udev_rules/ is installed, and use the
            # platform's PPS name (e.g. /dev/pps1 on Apalis).
            # container side (right) is fixed; config.env and chrony.conf never change.
            - /dev/ttyACM0:/dev/gps0
            - /dev/pps0:/dev/pps0
        ports:
            - 123:123
        container_name: gpsd-chrony
        # NOTE: do not use privileged: true — it makes Docker ignore the
        # devices: mappings above (all host devices appear under raw kernel
        # names and the custom container paths never exist).
        cap_add:
            - SYS_TIME      # chronyd: set the system clock
            - SYS_NICE      # chrony.conf sched_priority (SCHED_FIFO)
            - IPC_LOCK      # chrony.conf lock_all (mlockall)
        image: arluhdev/docker-gpsd-chrony:latest
        volumes:
            - chrony_logs:/var/log/chrony
            - chrony_drift:/var/lib/chrony
            - ./chrony_config:/etc/chrony
            - ./entrypoint.sh:/entrypoint.sh:ro

volumes:
    chrony_logs:

    chrony_drift:
